<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Me</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color: rgb(0,0,33);
            color:white;
            font-family: Arial;
        }

        nav{
            display:flex;
            justify-content:space-around;
            align-items:center;
            height:70px;
            background-color: rgb(18,18,62);
        }

        nav ul{
            display:flex;
        }

        nav ul li{
            list-style:none;
            margin:0 20px;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
        }

        nav ul li a:hover{
            color: rgb(170,107,228);
        }

        .contact-container{
            width:50%;
            margin:auto;
            margin-top:60px;
            background-color: rgb(18,18,62);
            padding:30px;
            border-radius:10px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color: rgb(170,107,228);
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:5px;
            font-size:16px;
        }

        textarea{
            height:120px;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            border-radius:5px;
            background-color: rgb(170,107,228);
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background-color: rgb(153,153,226);
        }

        .info{
            margin-top:30px ;
        }

        .info p{
            margin-top:10px ;
            text-align: center;
        }




/* MOBILE RESPONSIVE */

@media screen and (max-width: 768px){

nav{
    flex-direction: column;
    height: auto;
    padding: 15px 0;
}

nav ul{
    flex-direction: column;
    align-items: center;
}

nav ul li{
    margin: 10px 0;
}

.firstsection{
    flex-direction: column;
    text-align: center;
}

.firstsection > div{
    width: 90%;
}

.leftsection{
    font-size: 2rem;
}

.rightsection img{
    width: 90%;
    margin-top: 30px;
}

.about-container{
    flex-direction: column;
    text-align: center;
}

.about-text{
    width: 100%;
}

.about-image img{
    width: 250px;
}

.contact-container{
    width: 90%;
}

.project{
    width: 90%;
}

video{
    width: 100%;
}

img{
    max-width: 100%;
}

}















    </style>
</head>

<body>

    <header>

        <nav>

            <div class="left">

            </div>

            <div class="right">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>

        </nav>

    </header>

    <section class="contact-container">

        <h1>Contact Me</h1>

        <!-- WORKING EMAIL FORM -->
        <form action="mailto:rushitehle1137@gmail.com" method="post" enctype="text/plain">

            <input type="text" name="name" placeholder="Enter Your Name" required>

            <input type="email" name="email" placeholder="Enter Your Email" required>

            <textarea name="message" placeholder="Enter Your Message" required></textarea>

            <button type="submit">Send Message</button>

        </form>

        <div class="info">

            <p>Email: rushitehle1137@gmail.com</p>

            <p>Phone: +91 9145208151</p>

            <p>Location: Maharashtra, India</p>

        </div>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </section>

</body>
</html>
