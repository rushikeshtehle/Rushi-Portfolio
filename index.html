<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rushikesh Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body{
            background-color: rgb(0, 0, 33);
            color: white;
        }
        
        nav{
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 75 px;
            background-color: rgb(18, 18, 62);
        }

        nav ul{
            display: flex;
            justify-content: center;
        }

        nav ul li{
            list-style: none;
            margin: 0 23px;
        }
        
        nav ul li a{
            text-decoration: none;
            color: white;
        }

        nav ul li a:hover{
            color: rgb(153, 153, 226);
            font-size: 1.02rem;
        }
        .left{
            font-size: 2rem;
        }

        .firstsection{
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 80px 0 ;
        }

        .firstsection > div{
            width: 30%;
        }

        .leftsection{
            font-size: 2.5rem;
            
        }
        .rightsection img{
            width: 80%;
            margin: 50px 0;
        }
        .purple{
            color: rgb(170, 107, 228) ;
        }

        #element{
            color: rgb(153, 153, 226);
        }





/* MOBILE RESPONSIVE */

@media screen and (max-width: 768px){

nav{
    flex-direction: column;
    height: auto;
    padding: 15px 0;
}

nav ul{
    flex-direction: column;
    align-items: center;
}

nav ul li{
    margin: 10px 0;
}

.firstsection{
    flex-direction: column;
    text-align: center;
}

.firstsection > div{
    width: 90%;
}

.leftsection{
    font-size: 2rem;
}

.rightsection img{
    width: 90%;
    margin-top: 30px;
}

.about-container{
    flex-direction: column;
    text-align: center;
}

.about-text{
    width: 100%;
}

.about-image img{
    width: 250px;
}

.contact-container{
    width: 90%;
}

.project{
    width: 90%;
}

video{
    width: 100%;
}

img{
    max-width: 100%;
}

}








    </style>
</head>

    <header>
        <nav>
            <div class="left">Rushi Portfolio</div>
            <div class="right">
                <ul>
                    <li><a href="index.html">Home</a></li>

                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html">Contact Me</a></li>
                </ul>

    <main>

                <span id="element"></span>

            </div>
            <div class="rightsection">
                <img src="analyst.png" alt="">

        </section>
       


        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>

  <script>

      strings: ['Data Analyst.','and', 'Front end Devloper.'],

    });
